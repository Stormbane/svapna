# Model Configuration
# This is the SINGLE source of truth for model/provider config.
# No other file in the project should reference model names directly.

# The capable model — used for dream generation, scoring, evaluation
dream_generator:
  provider: anthropic
  model: claude-sonnet-4-5-20250929
  temperature: 0.8
  max_tokens: 4096

scorer:
  provider: anthropic
  model: claude-sonnet-4-5-20250929
  temperature: 0.3
  max_tokens: 1024

evaluator:
  provider: anthropic
  model: claude-sonnet-4-5-20250929
  temperature: 0.3
  max_tokens: 2048

# The identity core — local model, fine-tuned via LoRA
identity_core:
  provider: local
  base_model: unsloth/Qwen3-8B-unsloth-bnb-4bit
  quantization: 4bit
  enable_thinking: false
  lora_adapter: models/lora/latest

# Agent-specific overrides
agents:
  coder:
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    temperature: 0.7
    max_tokens: 4096
  tester:
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    temperature: 0.3
    max_tokens: 4096
