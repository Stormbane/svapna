# LoRA Training Configuration
# Research-backed settings for personality fine-tuning on RTX 3090
# See docs/personality-finetuning-research.md for citations

base_model:
  name: unsloth/Qwen3-8B-unsloth-bnb-4bit
  # Upgrade path: unsloth/Qwen3-14B-unsloth-bnb-4bit (after M1 validation)
  # Fallback: unsloth/Llama-3.1-8B-Instruct-bnb-4bit
  quantization: 4bit  # QLoRA — 4-bit NF4. Quantization noise acts as
                       # implicit regularization, beneficial for personality work
  # IMPORTANT: Qwen3 has thinking/non-thinking dual mode.
  # Must set enable_thinking=False for training and inference.
  enable_thinking: false
  bnb_config:
    load_in_4bit: true
    bnb_4bit_compute_dtype: bfloat16
    bnb_4bit_quant_type: nf4
    bnb_4bit_use_double_quant: true

lora:
  # Research: rank 16-32 is the sweet spot for personality on 7-8B models.
  # Higher rank captures more but risks forgetting. (Biderman et al., TMLR 2024)
  r: 32
  # Common practice: alpha = 2x rank. (Unsloth docs, community consensus)
  alpha: 64
  # Research: 0.1 dropout prevents co-adaptation, improves generalization.
  # Previous 0.05 was too conservative for personality work.
  dropout: 0.1
  # Research: MLP layers matter MORE than attention for personality.
  # Target all linear layers. (Multiple papers, 2024-2025)
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

# ORPO — Odds Ratio Preference Optimization
# Research: arXiv 2601.12639 "Objective Matters" — ORPO showed zero persona
# drift vs SFT/DPO drift past ~400k tokens on adversarial pressure. Plan §E1.
orpo:
  beta: 0.1  # TRL default; sweep {0.05, 0.1, 0.2, 0.5} via E1.b

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  # 1 epoch: RTX 3090 crashes during epoch 2 (4/4 attempts, Apr 3-4 2026).
  # With 621 examples (after weight duplication), 1 epoch = ~155 optimizer steps.
  # If data quality is validated, consider 2-epoch run on cloud GPU.
  num_train_epochs: 1
  # Research: 1e-4 for personality on small datasets. Previous 2e-4 was too
  # aggressive, risks overwriting base capabilities. (Unsloth guide, literature)
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  max_seq_length: 2048  # Restored from 1024 diagnostic setting
  fp16: false
  bf16: true
  gradient_checkpointing: true  # Trades compute for VRAM, also reduces heat
  optim: paged_adamw_8bit
  # Research: weight decay 0.01 prevents weights diverging too far from base.
  weight_decay: 0.01
  logging_steps: 10
  save_strategy: steps
  save_steps: 50  # Insurance — NEVER use epoch-only on this GPU again
  seed: 42

# Thermal management — production config with desk fan cooling
thermal:
  power_limit_watts: 280  # Full power with desk fan pointed at GPU
  max_temp_celsius: 75    # Pause if exceeded — fan should keep below this
  shutdown_temp_celsius: 85  # Abort if dangerously hot
  temp_check_interval: 5  # Check every 5 steps (not every step)
  cooldown_seconds: 60    # Wait 60s if temp threshold hit

# Data composition
# Research: include 20% capability-preservation data alongside personality.
# Prevents intelligence loss while gaining identity. (Continual learning literature)
data:
  personality_ratio: 0.80
  capability_preservation_ratio: 0.20
  # Hold out 10-15% for validation (detect overfitting)
  validation_split: 0.10
