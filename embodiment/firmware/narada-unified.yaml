# narada-unified.yaml
#
# Phase 3 of the embodiment work: voice + embodiment in ONE firmware.
# The bridge can now drive the face at every voice-turn transition
# without having to choose which firmware to flash.
#
# This is the merge of:
#   - embodiment/firmware/narada-voice-test.yaml (mWW + voice_assistant
#     + mic + speaker + media_player), itself derived from voice-pe's
#     box-3 reference.
#   - embodiment/firmware/narada-embodiment.yaml (display + atlas +
#     compositor + state machine).
#
# Memory budget concern: voice firmware reports ~12 KB internal RAM
# free after mWW boot; embodiment firmware uses ~150 KB internal for
# the ili9xxx framebuffer. There is no way both fit under default
# ESPHome ili9xxx allocation (which insists on MALLOC_CAP_INTERNAL).
# Mitigation here: see comments around `display:` for the workaround
# we apply if alloc fails — for now the YAML is the unmitigated merge
# so we can measure the actual headroom on hw.
#
# Once verified, narada-voice-test and narada-embodiment can be
# retired (they served as Phase 1/2 dev sandboxes).

substitutions:
  name: narada
  friendly_name: Narada

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  includes:
    - include/atlas_test_atlas.h
    - include/compositor.h
    - include/state_machine.h
    - include/sandhi_test_sandhi.h
    - include/sandhi_player.h
    - include/sandhi_catalog.h
  on_boot:
    # Compositor scene init. priority -100 runs AFTER all hardware
    # components are set up. Earlier we tried a priority 800 hook to
    # turn on the speaker amp before audio init (the AGC droop
    # theory) — but `output.turn_on` at priority 800 fires BEFORE
    # the gpio output component itself is registered (priority ~700),
    # causing a null deref panic and bootloader rollback. Discovered
    # 2026-05-04 morning when we noticed flashes claimed success but
    # boot timestamps stayed pinned to the last stable build.
    priority: -100
    then:
      - lambda: |-
          using namespace narada;
          comp().set_atlas(test_atlas_frames, test_atlas_pixels, TA_FRAME_COUNT);
          // Dim teal — visibly alive between turns. RGB(40, 60, 100) ~=
          // RGB565 0x21EC. Earlier (20,20,30) read as black at a glance.
          comp().set_bg_color(0x21EC);
          sm().apply_all();
          ESP_LOGI("comp", "boot scene staged via state machine");

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Push read-only data, instruction fetches, BT, and mbedtls into
      # PSRAM. These are the same flags the voice-only firmware uses;
      # without them mWW's tensor arena fails to allocate.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Cut WiFi buffers to free internal RAM for mWW + framebuffer.
      # See narada-voice-test.yaml for the full reasoning.
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "10"
      CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM: "16"
      CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM: "16"
      CONFIG_ESP_WIFI_RX_BA_WIN: "6"
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "16"
      CONFIG_LWIP_UDP_RECVMBOX_SIZE: "8"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

# mDNS off — matches voice firmware. Bridge connects by IP.
mdns:
  disabled: true

ota:
  - platform: esphome

api:
  services:
    # ---- High-level (state-machine) API — preferred for the bridge ----
    - service: set_mood
      variables:
        mood: int
        snap: bool
      then:
        - lambda: |-
            using namespace narada;
            sm().set_mood((Mood) mood, snap);
            ESP_LOGI("sm", "mood=%d snap=%d", mood, (int) snap);
    - service: set_speaking
      variables:
        speaking: bool
      then:
        - lambda: |-
            using namespace narada;
            sm().set_speaking(speaking);
            ESP_LOGD("sm", "speaking=%d", (int) speaking);
    - service: set_phoneme
      variables:
        phoneme: int
      then:
        - lambda: |-
            using namespace narada;
            sm().set_phoneme((Phoneme) phoneme);
    - service: set_gaze
      variables:
        gx: float
        gy: float
      then:
        - lambda: |-
            using namespace narada;
            sm().set_gaze(gx, gy);
    - service: set_glyph
      variables:
        visible: bool
        x: int
        y: int
      then:
        - lambda: |-
            using namespace narada;
            sm().set_glyph_visible(visible, (int16_t) x, (int16_t) y);
            ESP_LOGI("sm", "glyph=%d at (%d,%d)", (int) visible, x, y);
    - service: trigger_sandhi
      variables:
        id: int   # 0 = test sandhi (color sweep)
      then:
        - lambda: |-
            using namespace narada;
            const SandhiAsset* a = sandhi_by_id(id);
            if (a == nullptr) {
              ESP_LOGW("sandhi", "unknown sandhi id=%d", id);
              return;
            }
            sandhi().start(a, micros());
            ESP_LOGI("sandhi", "trigger id=%d", id);

    # ---- Voice — manual fallback if mWW misbehaves ----
    - service: trigger_listen
      then:
        - logger.log: "trigger_listen — starting voice_assistant"
        - voice_assistant.start:
            wake_word: "trigger"

    # ---- Low-level (debug) ----
    - service: set_layer
      variables:
        layer: int
        frame: int
        x: int
        y: int
      then:
        - lambda: |-
            using namespace narada;
            comp().set_layer((LayerId) layer, (uint16_t) frame, (int16_t) x, (int16_t) y);
            ESP_LOGI("comp", "set_layer: id=%d frame=%d at (%d,%d)", layer, frame, x, y);
    - service: clear_face
      then:
        - lambda: |-
            using namespace narada;
            for (uint8_t i = 0; i < LAYER_COUNT; i++) comp().clear_layer((LayerId) i);
            ESP_LOGI("comp", "cleared all layers");

globals:
  - id: frame_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: lambda_us_total
    type: uint64_t
    restore_value: false
    initial_value: '0'

# I2C bus shared by audio ADC + DAC. From voice firmware.
# Default (unnamed) I2C bus. GT911's schema does NOT expose i2c_id,
# so it can only bind to the IMPLICIT default bus. With an explicit
# id here, the touchscreen platform gets silently dropped at
# validation — exactly what was happening before 2026-05-03.
# Audio_adc and audio_dac below also bind to the default by omitting
# i2c_id. Match the working narada-body.yaml form.
i2c:
  sda: GPIO8
  scl: GPIO18
  scan: false

# SPI for the display. From embodiment firmware. No bus conflict
# with I2C above.
spi:
  clk_pin: 7
  mosi_pin: 6

# Touch-to-talk fallback. mWW is flaky in field conditions (RF noise,
# distance, ambient speech), so the touchscreen is the always-works
# input. GT911 sits on the same I2C bus declared above (SDA=8, SCL=18)
# with INT on GPIO3. The reset line is shared with the display on
# GPIO48, which the display block already drives — so no rst here.
# `wake_word: "touch"` tags the turn so the bridge can distinguish
# touch turns from real wake turns in its log.
touchscreen:
  - platform: gt911
    id: narada_touch
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true
    display: narada_display
    on_touch:
      - logger.log: "touch — voice_assistant.start"
      - voice_assistant.start:
          wake_word: "touch"

# Speaker power amp enable. Reverted to `switch:` with
# `RESTORE_DEFAULT_ON` 2026-05-04 — the volume-research output:
# variant with on_boot priority 800 was crashing at boot (priority
# 800 fires before output:gpio is initialized → null deref). Whether
# this is enough to avoid the AGC droop is unproven; the prior amp
# theory was never actually validated because all OTAs since 05-02
# evening had been silently rolling back via safe_mode.
switch:
  - platform: gpio
    name: Speaker Enable
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

# LCD backlight on GPIO47.
output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: backlight_output
    restore_mode: ALWAYS_ON

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    # 50ms underruns trigger pipeline pause/resume cycles that look
    # like "buffered but not playing". 100ms matches the BOX-3
    # reference YAML.
    buffer_duration: 100ms

media_player:
  - platform: speaker
    id: box_media_player
    # Name surfaces the entity to the API so external scripts (e.g.
    # scripts/test_play_media.py) can call media_player.play_media
    # without going through voice_assistant. Useful for loudness
    # bisects.
    name: "Narada Speaker"
    # Volume range matches the BOX-3 reference firmware. Going above
    # 0.8 clips against the speaker driver rails — clipped audio is
    # compressed by the driver and ends up sounding QUIETER than
    # clean 0.8 audio. Hard lesson from 2026-05-02 night.
    volume_min: 0.5
    volume_max: 0.8
    volume_initial: 0.8
    announcement_pipeline:
      speaker: box_speaker
      # We serve WAV from the bridge; declaring FLAC made the
      # decoder probe/buffer for several seconds. Match the actual
      # served format.
      format: WAV
      sample_rate: 48000
      num_channels: 1

micro_wake_word:
  id: mww
  microphone:
    microphone: box_mic
    channels: 0
    gain_factor: 4
  stop_after_detection: true
  vad:
  models:
    - model: github://esphome/micro-wake-word-models/models/v2/okay_nabu.json@main
      id: okay_nabu_v2
      probability_cutoff: 0.56
    - model: github://esphome/micro-wake-word-models/models/v2/hey_jarvis.json@main
      id: hey_jarvis_v2
      probability_cutoff: 0.56
  on_wake_word_detected:
    - logger.log:
        format: "mww FIRED: %s"
        args: ['wake_word.c_str()']
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: box_mic
  media_player: box_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  # 2.0 — matches the BOX-3 reference YAML exactly. The 1.0 we tried
  # at 2026-05-03 was visibly quieter; reference verified to be loud
  # under HA pipeline. With volume_max=0.8 capping the device side,
  # this 2x stays clean of the rails.
  volume_multiplier: 2.0
  on_client_connected:
    - logger.log: "va: client_connected (pipeline subscribed)"
    - micro_wake_word.start:
  on_client_disconnected:
    - logger.log: "va: client_disconnected"
    - micro_wake_word.stop:
  on_start:
    - logger.log: "va: on_start"
    # ESPHome's announcement_pipeline uses an UNBOUNDED deque for
    # queued URLs. If a previous fetch got stuck (which can happen
    # after socket errors / mid-playback aborts), the deque doesn't
    # drain and new TTS sits behind it for minutes. Stopping the
    # media_player at turn start clears the queue. Idempotent.
    - media_player.stop:
        id: box_media_player
  on_listening:
    - logger.log: "va: on_listening"
  on_stt_vad_start:
    - logger.log: "va: stt_vad_start"
  on_stt_vad_end:
    - logger.log: "va: stt_vad_end"
  on_stt_end:
    - logger.log:
        format: "va: stt_end text=%s"
        args: ['x.c_str()']
  on_intent_start:
    - logger.log: "va: intent_start"
  on_intent_end:
    - logger.log: "va: intent_end"
  on_tts_start:
    - logger.log:
        format: "va: tts_start text=%s"
        args: ['x.c_str()']
    # Note: BOX-3 reference YAML does NOT call audio_dac.set_volume
    # here. Earlier we added it on the theory that ES8311 REG32 was
    # mid-scale on boot — but the reference is loud without this,
    # and writing 0xFF mid-stream may cause glitches. Removed
    # 2026-05-03 night-3 after volume research.
  on_tts_end:
    - logger.log: "va: tts_end"
    # Belt-and-suspenders: on_end is what *should* restart mWW, but
    # in practice the wake stops firing after the first turn ~50% of
    # the time. Restarting on tts_end is idempotent (mww.start no-ops
    # if already running) and covers the case where on_end doesn't
    # fire cleanly.
    - micro_wake_word.start:
  on_end:
    - logger.log: "va: on_end (back to idle)"
    - micro_wake_word.start:
  on_error:
    - logger.log:
        format: "va: ERROR code=%s message=%s"
        args: ['code.c_str()', 'message.c_str()']

# Display: same as embodiment firmware. Update interval 33 ms (30 fps
# target). Pin choices verified to not collide with audio I2S, I2C,
# or speaker enable above.
display:
  - platform: ili9xxx
    id: narada_display
    model: S3BOX
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    invert_colors: false
    # Don't wipe the framebuffer between renders. The compositor's
    # whole point is to dirty-track layers and only repaint what
    # changed; auto-clear (which is on by default) was wiping the
    # buffer to black every cycle, so dirty layers flashed for one
    # frame and the screen reverted to black on the next.
    auto_clear_enabled: false
    update_interval: 33ms
    lambda: |-
      uint32_t t0 = micros();
      // While a sandhi is playing it owns the framebuffer; suppress
      // the sprite compositor for the duration. When the sandhi ends
      // the player calls comp().invalidate_all() so the compositor
      // repaints from scratch.
      if (narada::sandhi().active()) {
        narada::sandhi().render(it, t0);
      } else {
        narada::sm().tick(t0);
        narada::comp().render(it);
      }
      uint32_t t1 = micros();
      id(lambda_us_total) = id(lambda_us_total) + (uint64_t)(t1 - t0);
      id(frame_count) = id(frame_count) + 1;
      if (id(frame_count) >= 30) {
        uint64_t avg = id(lambda_us_total) / 30u;
        size_t free_int = heap_caps_get_free_size(MALLOC_CAP_INTERNAL);
        size_t free_dma = heap_caps_get_free_size(MALLOC_CAP_DMA);
        size_t largest = heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL);
        ESP_LOGI("comp",
                 "frames=%d avg_lambda_us=%llu (%.1f fps) "
                 "free_int=%u free_dma=%u largest_int=%u",
                 id(frame_count), (unsigned long long) avg,
                 1000000.0f / (float) avg,
                 (unsigned) free_int, (unsigned) free_dma,
                 (unsigned) largest);
        id(frame_count) = 0;
        id(lambda_us_total) = 0;
      }
