# narada-embodiment.yaml
#
# Phase 2 of the embodiment scenes/sprites work — first firmware that
# uses the layer compositor + atlas format. The state machine and
# bridge integration come in the next commits; for now, layers are set
# via API services so we can drive scenes by hand and watch the
# compositor respond.
#
# Phase 1 (perf reference): embodiment/firmware/narada-sprite-test.yaml
# Design doc: docs/plans/embodiment-phase2-design-2026-05-02.md
# Atlas: embodiment/sprites/test_atlas/ → include/atlas_test_atlas.h
# Compositor: include/compositor.h
#
# API surface (everything is "set this layer to this frame"):
#   - set_face(eye_l, eye_r, mouth, body)  // most common: snap a face
#   - set_layer(layer, frame, x, y)        // direct poke for testing
#   - set_mood(mood)                       // 0=neutral, 1=curious, 2=focused
#   - set_glyph(visible, x, y)
#   - clear_face()                         // hide everything
#
# Default boot lands a "neutral face" so we can confirm the path is
# alive without sending any commands.

substitutions:
  name: narada-embodiment
  friendly_name: Narada Embodiment

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  includes:
    - include/atlas_test_atlas.h
    - include/compositor.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          using namespace narada;
          narada::comp().set_atlas(test_atlas_frames, test_atlas_pixels, TA_FRAME_COUNT);
          narada::comp().set_bg_color(0x18C3);  // ~Color(20, 20, 30) in RGB565
          // Default neutral face. Anchors are screen-center positions;
          // the atlas's (ox, oy) convert anchor → top-left at blit time.
          narada::comp().set_layer(LAYER_BODY,      TA_BODY_IDLE,      160, 180);
          narada::comp().set_layer(LAYER_MOOD,      TA_MOOD_NEUTRAL,   160, 130);
          narada::comp().set_layer(LAYER_EYE_LEFT,  TA_EYE_LEFT,       136,  96);
          narada::comp().set_layer(LAYER_EYE_RIGHT, TA_EYE_RIGHT,      184,  96);
          narada::comp().set_layer(LAYER_MOUTH,     TA_MOUTH_NEUTRAL,  160, 146);
          ESP_LOGI("comp", "boot scene staged: neutral face on dark bg");

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mdns:
  disabled: true

ota:
  - platform: esphome

api:
  services:
    - service: set_face
      variables:
        eye_l: int
        eye_r: int
        mouth: int
        body: int
      then:
        - lambda: |-
            using namespace narada;
            narada::comp().set_layer(LAYER_EYE_LEFT,  (uint16_t) eye_l, 136,  96);
            narada::comp().set_layer(LAYER_EYE_RIGHT, (uint16_t) eye_r, 184,  96);
            narada::comp().set_layer(LAYER_MOUTH,     (uint16_t) mouth, 160, 146);
            narada::comp().set_layer(LAYER_BODY,      (uint16_t) body,  160, 180);
            ESP_LOGI("comp", "set_face: el=%d er=%d m=%d b=%d", eye_l, eye_r, mouth, body);
    - service: set_layer
      variables:
        layer: int
        frame: int
        x: int
        y: int
      then:
        - lambda: |-
            using namespace narada;
            narada::comp().set_layer((LayerId) layer, (uint16_t) frame, (int16_t) x, (int16_t) y);
            ESP_LOGI("comp", "set_layer: id=%d frame=%d at (%d,%d)", layer, frame, x, y);
    - service: set_mood
      variables:
        mood: int
      then:
        - lambda: |-
            using namespace narada;
            uint16_t f = TA_MOOD_NEUTRAL;
            if (mood == 1) f = TA_MOOD_CURIOUS;
            else if (mood == 2) f = TA_MOOD_FOCUSED;
            narada::comp().set_layer(LAYER_MOOD, f, 160, 130);
            ESP_LOGI("comp", "set_mood: %d", mood);
    - service: set_glyph
      variables:
        visible: bool
        x: int
        y: int
      then:
        - lambda: |-
            using namespace narada;
            if (visible) {
              narada::comp().set_layer(LAYER_MARG_1, TA_GLYPH_DOT, (int16_t) x, (int16_t) y);
            } else {
              narada::comp().clear_layer(LAYER_MARG_1);
            }
            ESP_LOGI("comp", "set_glyph: visible=%d at (%d,%d)", (int) visible, x, y);
    - service: clear_face
      then:
        - lambda: |-
            using namespace narada;
            for (uint8_t i = 0; i < LAYER_COUNT; i++) narada::comp().clear_layer((LayerId) i);
            ESP_LOGI("comp", "cleared all layers");

# Per-frame perf counters. The Compositor itself is a Meyer's
# singleton in compositor.h — see narada::comp() — because ESPHome's
# globals block can't hold a non-trivial type whose declaration
# resolves before the user includes are processed.
globals:
  - id: frame_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: lambda_us_total
    type: uint64_t
    restore_value: false
    initial_value: '0'

spi:
  clk_pin: 7
  mosi_pin: 6

display:
  - platform: ili9xxx
    id: narada_display
    model: S3BOX
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    invert_colors: false
    update_interval: 33ms
    lambda: |-
      uint32_t t0 = micros();
      narada::comp().render(it);
      uint32_t t1 = micros();
      id(lambda_us_total) = id(lambda_us_total) + (uint64_t)(t1 - t0);
      id(frame_count) = id(frame_count) + 1;
      if (id(frame_count) >= 30) {
        uint64_t avg = id(lambda_us_total) / 30u;
        size_t free_int = heap_caps_get_free_size(MALLOC_CAP_INTERNAL);
        size_t free_dma = heap_caps_get_free_size(MALLOC_CAP_DMA);
        size_t largest = heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL);
        ESP_LOGI("comp",
                 "frames=%d avg_lambda_us=%llu (%.1f fps) "
                 "free_int=%u free_dma=%u largest_int=%u",
                 id(frame_count), (unsigned long long) avg,
                 1000000.0f / (float) avg,
                 (unsigned) free_int, (unsigned) free_dma,
                 (unsigned) largest);
        id(frame_count) = 0;
        id(lambda_us_total) = 0;
      }
