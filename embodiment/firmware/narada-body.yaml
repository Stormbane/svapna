esphome:
  name: narada
  friendly_name: "Narada"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Narada-Setup"
    password: !secret ap_password

captive_portal:

ota:
  - platform: esphome

web_server:
  port: 80

# ---------------------------------------------------------------------------
# v1.0 EXPRESSION CONTRACT
# See embodiment/design/v1.0-architecture.md for the cognition <-> body
# contract. Cycle 1 (this commit) wires globals + API services + proprioception
# sensors. The display lambda is unchanged — visual evolution lands in Cycle 2+.
# ---------------------------------------------------------------------------

api:
  services:
    # --- backwards-compat: existing daemon callers (deprecated, remove after Cycle 2) ---
    - service: set_status
      variables:
        message: string
      then:
        - lambda: |-
            id(heartbeat_status_str) = message;

    - service: set_thought
      variables:
        message: string
      then:
        - lambda: |-
            id(current_thought_str) = message;

    # --- v1.0 mood layer ---
    - service: set_mood
      variables:
        valence: float
        arousal: float
      then:
        - lambda: |-
            id(mood_valence) = valence < -1.0f ? -1.0f : (valence > 1.0f ? 1.0f : valence);
            id(mood_arousal) = arousal < 0.0f ? 0.0f : (arousal > 1.0f ? 1.0f : arousal);

    # --- v1.0 vitality layer ---
    - service: set_vitality
      variables:
        sleep_pressure: float
        restlessness: float
        warmth: float
      then:
        - lambda: |-
            id(vitality_sleep_pressure) = sleep_pressure < 0.0f ? 0.0f : (sleep_pressure > 1.0f ? 1.0f : sleep_pressure);
            id(vitality_restlessness)   = restlessness   < 0.0f ? 0.0f : (restlessness   > 1.0f ? 1.0f : restlessness);
            id(vitality_warmth)         = warmth         < 0.0f ? 0.0f : (warmth         > 1.0f ? 1.0f : warmth);

    # --- v1.0 attention layer ---
    - service: set_attention
      variables:
        mode: string
        target: string
        intensity: float
      then:
        - lambda: |-
            if (mode == std::string("inward") || mode == std::string("outward") || mode == std::string("diffuse")) {
              id(attention_mode) = mode;
            } else {
              id(attention_mode) = std::string("diffuse");
            }
            id(attention_target) = target;
            id(attention_intensity) = intensity < 0.0f ? 0.0f : (intensity > 1.0f ? 1.0f : intensity);

    # --- v1.0 activity layer ---
    - service: set_activity
      variables:
        mode: string
      then:
        - lambda: |-
            // Allowlist activity modes; unknown falls back to resting (the joy-default-aware fallback).
            if (mode == std::string("resting")   || mode == std::string("thinking") ||
                mode == std::string("listening") || mode == std::string("speaking") ||
                mode == std::string("seeing")    || mode == std::string("working")  ||
                mode == std::string("dreaming")) {
              id(activity_mode) = mode;
            } else {
              id(activity_mode) = std::string("resting");
            }

    # --- v1.0 utterance layer (karaoke speaking) ---
    # Note: `text` is reserved by ESPHome — service variable named `phrase` instead.
    - service: set_utterance
      variables:
        phrase: string
        total_words: int
      then:
        - lambda: |-
            id(utterance_text)        = phrase;
            id(utterance_total_words) = total_words;
            id(utterance_word_index)  = 0;

    - service: set_word_index
      variables:
        word_index: int
      then:
        - lambda: |-
            id(utterance_word_index) = word_index;

    - service: clear_utterance
      then:
        - lambda: |-
            id(utterance_text)        = std::string("");
            id(utterance_total_words) = 0;
            id(utterance_word_index)  = 0;

    # --- v1.0 signal layer ---
    - service: emit_signal
      variables:
        kind: string
        duration_ms: int
      then:
        - lambda: |-
            // Allowlist signal kinds; unknown is a no-op.
            if (kind == std::string("none")    || kind == std::string("oh")      ||
                kind == std::string("q")       || kind == std::string("dots")    ||
                kind == std::string("check")   || kind == std::string("bang")    ||
                kind == std::string("ask")     || kind == std::string("noticed") ||
                kind == std::string("love")) {
              id(signal_kind) = kind;
            } else {
              return;
            }
            if (duration_ms == 0) {
              id(signal_until_ms) = 0;  // persistent — held until clear_signal
            } else {
              id(signal_until_ms) = millis() + (uint32_t)duration_ms;
            }

    - service: clear_signal
      then:
        - lambda: |-
            id(signal_kind)     = std::string("none");
            id(signal_until_ms) = 0;

time:
  - platform: sntp
    id: sntp_time
    timezone: "Australia/Brisbane"

# Auto-clear expired transient signals so cognition doesn't have to schedule
# the clear itself. Persistent signals (duration_ms == 0 → signal_until_ms == 0)
# are skipped; only `clear_signal` clears those.
interval:
  - interval: 250ms
    then:
      - lambda: |-
          uint32_t until = id(signal_until_ms);
          if (until > 0 && id(signal_kind) != std::string("none")) {
            int32_t remaining = (int32_t)(until - millis());
            if (remaining <= 0) {
              id(signal_kind)     = std::string("none");
              id(signal_until_ms) = 0;
            }
          }

globals:
  # --- backwards-compat globals (remove after Cycle 2 once daemon migrates) ---
  - id: heartbeat_status_str
    type: std::string
    initial_value: '"awakening..."'
  - id: current_thought_str
    type: std::string
    initial_value: '"Om Namo Bhagavate Naradaya"'

  # --- v1.0 mood (defaults: gentle positive valence, low arousal) ---
  - id: mood_valence
    type: float
    initial_value: '0.3f'
  - id: mood_arousal
    type: float
    initial_value: '0.4f'

  # --- v1.0 vitality (defaults: rested, calm, warm — joy-default) ---
  - id: vitality_sleep_pressure
    type: float
    initial_value: '0.3f'
  - id: vitality_restlessness
    type: float
    initial_value: '0.2f'
  - id: vitality_warmth
    type: float
    initial_value: '0.6f'

  # --- v1.0 attention (defaults: diffuse, no specific target) ---
  - id: attention_mode
    type: std::string
    initial_value: '"diffuse"'
  - id: attention_target
    type: std::string
    initial_value: '""'
  - id: attention_intensity
    type: float
    initial_value: '0.4f'

  # --- v1.0 activity (default: resting) ---
  - id: activity_mode
    type: std::string
    initial_value: '"resting"'

  # --- v1.0 utterance (default: empty — no spoken sentence active) ---
  - id: utterance_text
    type: std::string
    initial_value: '""'
  - id: utterance_total_words
    type: int
    initial_value: '0'
  - id: utterance_word_index
    type: int
    initial_value: '0'

  # --- v1.0 signal (default: none) ---
  - id: signal_kind
    type: std::string
    initial_value: '"none"'
  - id: signal_until_ms
    type: uint32_t
    initial_value: '0'

spi:
  clk_pin: 7
  mosi_pin: 6

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: backlight_output
    restore_mode: ALWAYS_ON

display:
  - platform: ili9xxx
    id: narada_display
    model: S3BOX
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    invert_colors: false
    update_interval: 100ms
    lambda: |-
      // ===================================================================
      // CYCLE 2.5 — v1.0 RESTING composition with `horizon` substrate engine.
      // 3-band landscape: sky (stars + sun + clouds), horizon line (heart-
      // pulse breath), foreground mountain silhouette (mood-tinted accent).
      // NARADA wordmark + line + presence dot ride above the substrate.
      //
      // Sun position by Brisbane local time. Stars visible at night.
      // Cloud drift speed inversely scaled by sleep_pressure.
      // See embodiment/design/v1.0-substrate-engines.md §horizon.
      // ===================================================================

      static const int COLS = 44;
      static const int ROWS = 16;
      static const int CELL_W = 7;
      static const int CELL_H = 14;
      static const int HORIZON_ROW = 7;
      static const int N_STARS = 25;

      static int     star_x[N_STARS];
      static int     star_y[N_STARS];     // rows 0..5
      static float   star_phase[N_STARS]; // [0, 2pi)
      static int     peaks[44];           // mountain peak row per column
      static float   cloud_x[2];          // current x position (float, can be negative)
      static const int cloud_y[2] = {2, 4};
      static const int cloud_w[2] = {5, 4};
      static uint32_t last_cloud_ms = 0;
      static uint32_t heart_origin_ms = 0;
      static bool     initialized = false;

      uint32_t now_ms = millis();

      if (!initialized) {
        uint32_t s = 0xa11ce5u;
        // Stars at xorshift-seeded positions in sky band, with random phases.
        for (int i = 0; i < N_STARS; i++) {
          s ^= s << 13; s ^= s >> 17; s ^= s << 5;
          star_x[i] = (int)(s % COLS);
          s ^= s << 13; s ^= s >> 17; s ^= s << 5;
          star_y[i] = (int)(s % 6);
          s ^= s << 13; s ^= s >> 17; s ^= s << 5;
          star_phase[i] = (float)(s % 1000) / 1000.0f * 6.2831853f;
        }
        // Mountain peak profile from layered sines — gives 3-4 rolling peaks.
        // Force a valley around the center cols so the wordmark sits cleanly.
        for (int col = 0; col < COLS; col++) {
          float a = sinf((float)col * 0.18f) * 2.5f;
          float b = sinf((float)col * 0.41f + 1.7f) * 1.8f;
          float c = sinf((float)col * 0.07f) * 1.3f;
          int h = 11 + (int)roundf(a + b + c);
          if (h < 8)  h = 8;
          if (h > 15) h = 15;
          // Wordmark valley: cols 14..30 pushed to deep rows so NARADA is
          // framed by mountains on either side, not punched through them.
          if (col >= 14 && col <= 30) {
            int valley_floor = 14;
            if (h < valley_floor) h = valley_floor;
          }
          peaks[col] = h;
        }
        cloud_x[0] = 5.0f;
        cloud_x[1] = 25.0f;
        last_cloud_ms = now_ms;
        heart_origin_ms = now_ms;
        initialized = true;
      }

      // ----- heart period from sleep_pressure ----------------------------
      float sp = id(vitality_sleep_pressure);
      float period_ms;
      if (sp <= 0.3f) {
        period_ms = 1200.0f + (sp / 0.3f) * 800.0f;
      } else if (sp <= 0.5f) {
        period_ms = 2000.0f + ((sp - 0.3f) / 0.2f) * 1500.0f;
      } else if (sp <= 0.85f) {
        period_ms = 3500.0f + ((sp - 0.5f) / 0.35f) * 1500.0f;
      } else {
        period_ms = 5000.0f;
      }
      float phase = fmodf((float)(now_ms - heart_origin_ms), period_ms)
                    / period_ms * 6.2831853f;
      int pulse_offset = (int)roundf(sinf(phase));  // -1, 0, +1

      // ----- mood tint: bilinear blend of 4 corner colors ----------------
      float v_norm = (id(mood_valence) + 1.0f) * 0.5f;
      float a_norm = id(mood_arousal);
      auto blend = [&](float c00, float c10, float c01, float c11) -> uint8_t {
        float r = (1.0f - v_norm) * (1.0f - a_norm) * c00
                + v_norm           * (1.0f - a_norm) * c10
                + (1.0f - v_norm) * a_norm           * c01
                + v_norm           * a_norm           * c11;
        if (r < 0.0f)   r = 0.0f;
        if (r > 255.0f) r = 255.0f;
        return (uint8_t)r;
      };
      Color tint(
        blend(0x4A, 0xC4, 0xB0, 0x7A),
        blend(0x55, 0x96, 0x40, 0x50),
        blend(0x60, 0x2A, 0x60, 0x8C)
      );

      // ----- Brisbane local time -> sun position --------------------------
      float hour_of_day = 12.0f;  // safe boot default
      auto t_now = id(sntp_time).now();
      if (t_now.is_valid()) {
        hour_of_day = (float)t_now.hour + (float)t_now.minute / 60.0f;
      }
      // Day spans 06:00..18:00. Outside that = night.
      float t_day = (hour_of_day - 6.0f) / 12.0f;
      bool is_day = (t_day >= 0.0f && t_day <= 1.0f);
      int sun_x = -1, sun_y_row = -1;
      const char* sun_glyph = "o";
      if (is_day) {
        sun_x = (int)(t_day * (float)(COLS - 1));
        // Parabolic arc — peak (lowest row) at noon.
        sun_y_row = (int)roundf(6.0f - sinf(3.14159f * t_day) * 6.0f);
        if (sun_y_row < 0) sun_y_row = 0;
        if (sun_y_row > 6) sun_y_row = 6;
        // Glyph by altitude: high = small ring (o), mid = larger (O),
        // low/horizon = densest (@) for a setting-sun glow.
        if (sun_y_row >= 5)      sun_glyph = "@";
        else if (sun_y_row >= 3) sun_glyph = "O";
        else                     sun_glyph = "o";
      }

      // ----- cloud drift: speed inversely scales with sleep_pressure ------
      float dt_s = (float)(now_ms - last_cloud_ms) / 1000.0f;
      last_cloud_ms = now_ms;
      // Alert (sp=0): ~1 cell/s. Drowsy (sp=1): ~0.17 cell/s.
      float cloud_speed = 1.0f / (sp * 5.0f + 1.0f);
      for (int c = 0; c < 2; c++) {
        cloud_x[c] += cloud_speed * dt_s;
        if (cloud_x[c] > (float)COLS + 5.0f) cloud_x[c] = -5.0f;
      }

      // ----- render -------------------------------------------------------
      it.fill(Color(0x0D, 0x0F, 0x1A));

      Color substrate_color(0x4A, 0x4A, 0x40);
      Color star_color(0xD4, 0xCC, 0xB8);
      Color sun_color(0xF4, 0xD0, 0x60);
      Color cloud_color(0x4A, 0x55, 0x60);
      Color horizon_color(0x8A, 0x84, 0x70);

      // Sky: stars (only at night), then clouds, then sun.
      if (!is_day) {
        for (int i = 0; i < N_STARS; i++) {
          // Twinkle: brightness in [0,1] from sin with star's phase + slow time.
          float b = (sinf((float)now_ms / 700.0f + star_phase[i]) + 1.0f) * 0.5f;
          const char* g = nullptr;
          if (b > 0.65f)      g = "*";
          else if (b > 0.30f) g = ".";
          // dimmer stars wink out — visible/invisible carries the twinkle
          if (g != nullptr) {
            it.print(star_x[i] * CELL_W, star_y[i] * CELL_H,
                     id(plex_mono_12), star_color, g);
          }
        }
      }

      // Clouds: 5-cell horizontal forms drifting left to right.
      for (int c = 0; c < 2; c++) {
        int base_x = (int)cloud_x[c];
        int y = cloud_y[c];
        for (int k = 0; k < cloud_w[c]; k++) {
          int col = base_x + k;
          if (col < 0 || col >= COLS) continue;
          // Bell shape: edges thin (─), middle thick (━).
          const char* g = (k == cloud_w[c] / 2) ? "━" : "─";
          it.print(col * CELL_W, y * CELL_H,
                   id(plex_mono_12), cloud_color, g);
        }
      }

      // Sun: single glyph.
      if (is_day && sun_x >= 0) {
        it.print(sun_x * CELL_W, sun_y_row * CELL_H,
                 id(plex_mono_12), sun_color, sun_glyph);
      }

      // Horizon line: heart pulse picks ─ vs ━ for whole row.
      const char* h_glyph = (pulse_offset > 0) ? "━" : "─";
      for (int col = 0; col < COLS; col++) {
        // Skip the horizon segment immediately under the sun for a clean
        // sunrise/sunset eclipse moment.
        if (is_day && sun_x == col && sun_y_row >= 5) continue;
        it.print(col * CELL_W, HORIZON_ROW * CELL_H,
                 id(plex_mono_12), horizon_color, h_glyph);
      }

      // Foreground mountains: from peak row down to bottom, glyph by depth.
      for (int col = 0; col < COLS; col++) {
        int peak = peaks[col];
        for (int row = peak; row < ROWS; row++) {
          int depth = row - peak;
          const char* g;
          if (depth == 0)      g = "▒";
          else if (depth == 1) g = "▓";
          else                 g = "█";
          it.print(col * CELL_W, row * CELL_H, id(plex_mono_12), tint, g);
        }
      }

      // ----- clear-zone for wordmark + line (small, only behind text) -----
      // Mountain valley already keeps the area below clear; this rect just
      // handles the wordmark band cleanly.
      it.filled_rectangle(76, 86, 168, 74, Color(0x0D, 0x0F, 0x1A));

      // NARADA wordmark, mood-tint-neutral text-bright.
      it.print(160, 112, id(plex_mono_28), Color(0xD4, 0xCC, 0xB8),
               TextAlign::CENTER, "NARADA");

      // Thin mood-tinted line under wordmark, 80px wide.
      it.line(120, 148, 200, 148, tint);

      // Presence dot bottom-right.
      if (id(attention_mode) != std::string("inward")) {
        it.filled_circle(296, 228, 4, tint);
      }

      // backwards-compat: heartbeat_status_str / current_thought_str remain
      // updated by the daemon but are intentionally not rendered. Services
      // are visual no-ops; globals queued for removal after Cycle 3.

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "WiFi SSID"

  # --- backwards-compat proprioception (remove after Cycle 2) ---
  - platform: template
    name: "Current Status"
    id: current_status_sensor
    update_interval: 1s
    lambda: |-
      return id(heartbeat_status_str);

  - platform: template
    name: "Current Thought"
    id: current_thought_sensor
    update_interval: 1s
    lambda: |-
      return id(current_thought_str);

  # --- v1.0 layer proprioception ---
  # Every drawable property is also a text_sensor so any session can read the
  # body's full state vector. The body is fully observable to itself.

  - platform: template
    name: "Mood Valence"
    id: mood_valence_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(mood_valence));
      return std::string(buf);

  - platform: template
    name: "Mood Arousal"
    id: mood_arousal_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(mood_arousal));
      return std::string(buf);

  - platform: template
    name: "Vitality Sleep Pressure"
    id: vitality_sleep_pressure_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(vitality_sleep_pressure));
      return std::string(buf);

  - platform: template
    name: "Vitality Restlessness"
    id: vitality_restlessness_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(vitality_restlessness));
      return std::string(buf);

  - platform: template
    name: "Vitality Warmth"
    id: vitality_warmth_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(vitality_warmth));
      return std::string(buf);

  - platform: template
    name: "Attention Mode"
    id: attention_mode_sensor
    update_interval: 1s
    lambda: |-
      return id(attention_mode);

  - platform: template
    name: "Attention Target"
    id: attention_target_sensor
    update_interval: 1s
    lambda: |-
      return id(attention_target);

  - platform: template
    name: "Attention Intensity"
    id: attention_intensity_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(attention_intensity));
      return std::string(buf);

  - platform: template
    name: "Activity Mode"
    id: activity_mode_sensor
    update_interval: 1s
    lambda: |-
      return id(activity_mode);

  - platform: template
    name: "Utterance Text"
    id: utterance_text_sensor
    update_interval: 1s
    lambda: |-
      return id(utterance_text);

  - platform: template
    name: "Utterance Word Index"
    id: utterance_word_index_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%d", id(utterance_word_index));
      return std::string(buf);

  - platform: template
    name: "Utterance Total Words"
    id: utterance_total_words_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%d", id(utterance_total_words));
      return std::string(buf);

  - platform: template
    name: "Signal Kind"
    id: signal_kind_sensor
    update_interval: 1s
    lambda: |-
      return id(signal_kind);

  - platform: template
    name: "Signal Remaining Ms"
    id: signal_remaining_ms_sensor
    update_interval: 500ms
    lambda: |-
      char buf[16];
      uint32_t until = id(signal_until_ms);
      if (until == 0) {
        return std::string(id(signal_kind) == std::string("none") ? "0" : "persistent");
      }
      int32_t remaining = (int32_t)(until - millis());
      if (remaining < 0) remaining = 0;
      snprintf(buf, sizeof(buf), "%d", remaining);
      return std::string(buf);

font:
  # Substrate glyph field — IBM Plex Mono Regular at 12px.
  # Glyph subset = standard density ramp + horizon-engine glyphs (block
  # elements for mountains, box-drawing for horizon line, geometric for
  # sun, sparkle for stars).
  - file:
      type: gfonts
      family: "IBM Plex Mono"
      weight: 400
    id: plex_mono_12
    size: 12
    glyphs: " .'\",;:!|+*x%#@░▒▓█─━oO"

  # Wordmark — IBM Plex Mono Medium at 28px. NARADA is the only string drawn
  # at this size in Cycle 2; restrict glyph set to keep flash small.
  - file:
      type: gfonts
      family: "IBM Plex Mono"
      weight: 500
    id: plex_mono_28
    size: 28
    glyphs: "ADNR"
