font:
  # Local IBM Plex Mono TTFs (extracted to embodiment/assets/fonts/). Glyph
  # vocabulary is constrained to ASCII because the upstream font does NOT
  # carry block elements / box drawing / geometric shapes — gfonts was
  # silently substituting tofu for those, which we noticed during Cycle
  # 2.6 prep. ASCII-only is also the more honest aesthetic.
  - file: "../assets/fonts/IBMPlexMono-Regular.ttf"
    id: plex_mono_12
    size: 12
    glyphs: " .,:;'\"!|+*xoO@_~=#%-/\\()v^<>"

  - file: "../assets/fonts/IBMPlexMono-Medium.ttf"
    id: plex_mono_28
    size: 28
    glyphs: "ADNR"
