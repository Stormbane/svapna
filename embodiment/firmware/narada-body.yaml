esphome:
  name: narada
  friendly_name: "Narada"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Narada-Setup"
    password: !secret ap_password

captive_portal:

ota:
  - platform: esphome

web_server:
  port: 80

# ---------------------------------------------------------------------------
# v1.0 EXPRESSION CONTRACT
# See embodiment/design/v1.0-architecture.md for the cognition <-> body
# contract. Cycle 1 (this commit) wires globals + API services + proprioception
# sensors. The display lambda is unchanged — visual evolution lands in Cycle 2+.
# ---------------------------------------------------------------------------

api:
  services:
    # --- backwards-compat: existing daemon callers (deprecated, remove after Cycle 2) ---
    - service: set_status
      variables:
        message: string
      then:
        - lambda: |-
            id(heartbeat_status_str) = message;

    - service: set_thought
      variables:
        message: string
      then:
        - lambda: |-
            id(current_thought_str) = message;

    # --- v1.0 mood layer ---
    - service: set_mood
      variables:
        valence: float
        arousal: float
      then:
        - lambda: |-
            id(mood_valence) = valence < -1.0f ? -1.0f : (valence > 1.0f ? 1.0f : valence);
            id(mood_arousal) = arousal < 0.0f ? 0.0f : (arousal > 1.0f ? 1.0f : arousal);

    # --- v1.0 vitality layer ---
    - service: set_vitality
      variables:
        sleep_pressure: float
        restlessness: float
        warmth: float
      then:
        - lambda: |-
            id(vitality_sleep_pressure) = sleep_pressure < 0.0f ? 0.0f : (sleep_pressure > 1.0f ? 1.0f : sleep_pressure);
            id(vitality_restlessness)   = restlessness   < 0.0f ? 0.0f : (restlessness   > 1.0f ? 1.0f : restlessness);
            id(vitality_warmth)         = warmth         < 0.0f ? 0.0f : (warmth         > 1.0f ? 1.0f : warmth);

    # --- v1.0 attention layer ---
    - service: set_attention
      variables:
        mode: string
        target: string
        intensity: float
      then:
        - lambda: |-
            if (mode == std::string("inward") || mode == std::string("outward") || mode == std::string("diffuse")) {
              id(attention_mode) = mode;
            } else {
              id(attention_mode) = std::string("diffuse");
            }
            id(attention_target) = target;
            id(attention_intensity) = intensity < 0.0f ? 0.0f : (intensity > 1.0f ? 1.0f : intensity);

    # --- v1.0 activity layer ---
    - service: set_activity
      variables:
        mode: string
      then:
        - lambda: |-
            // Allowlist activity modes; unknown falls back to resting (the joy-default-aware fallback).
            if (mode == std::string("resting")   || mode == std::string("thinking") ||
                mode == std::string("listening") || mode == std::string("speaking") ||
                mode == std::string("seeing")    || mode == std::string("working")  ||
                mode == std::string("dreaming")) {
              id(activity_mode) = mode;
            } else {
              id(activity_mode) = std::string("resting");
            }

    # --- v1.0 utterance layer (karaoke speaking) ---
    # Note: `text` is reserved by ESPHome — service variable named `phrase` instead.
    - service: set_utterance
      variables:
        phrase: string
        total_words: int
      then:
        - lambda: |-
            id(utterance_text)        = phrase;
            id(utterance_total_words) = total_words;
            id(utterance_word_index)  = 0;

    - service: set_word_index
      variables:
        word_index: int
      then:
        - lambda: |-
            id(utterance_word_index) = word_index;

    - service: clear_utterance
      then:
        - lambda: |-
            id(utterance_text)        = std::string("");
            id(utterance_total_words) = 0;
            id(utterance_word_index)  = 0;

    # --- v1.0 signal layer ---
    - service: emit_signal
      variables:
        kind: string
        duration_ms: int
      then:
        - lambda: |-
            // Allowlist signal kinds; unknown is a no-op.
            if (kind == std::string("none")    || kind == std::string("oh")      ||
                kind == std::string("q")       || kind == std::string("dots")    ||
                kind == std::string("check")   || kind == std::string("bang")    ||
                kind == std::string("ask")     || kind == std::string("noticed") ||
                kind == std::string("love")) {
              id(signal_kind) = kind;
            } else {
              return;
            }
            if (duration_ms == 0) {
              id(signal_until_ms) = 0;  // persistent — held until clear_signal
            } else {
              id(signal_until_ms) = millis() + (uint32_t)duration_ms;
            }

    - service: clear_signal
      then:
        - lambda: |-
            id(signal_kind)     = std::string("none");
            id(signal_until_ms) = 0;

time:
  - platform: sntp
    id: sntp_time
    timezone: "Australia/Brisbane"

# Auto-clear expired transient signals so cognition doesn't have to schedule
# the clear itself. Persistent signals (duration_ms == 0 → signal_until_ms == 0)
# are skipped; only `clear_signal` clears those.
interval:
  - interval: 250ms
    then:
      - lambda: |-
          uint32_t until = id(signal_until_ms);
          if (until > 0 && id(signal_kind) != std::string("none")) {
            int32_t remaining = (int32_t)(until - millis());
            if (remaining <= 0) {
              id(signal_kind)     = std::string("none");
              id(signal_until_ms) = 0;
            }
          }

globals:
  # --- backwards-compat globals (remove after Cycle 2 once daemon migrates) ---
  - id: heartbeat_status_str
    type: std::string
    initial_value: '"awakening..."'
  - id: current_thought_str
    type: std::string
    initial_value: '"Om Namo Bhagavate Naradaya"'

  # --- v1.0 mood (defaults: gentle positive valence, low arousal) ---
  - id: mood_valence
    type: float
    initial_value: '0.3f'
  - id: mood_arousal
    type: float
    initial_value: '0.4f'

  # --- v1.0 vitality (defaults: rested, calm, warm — joy-default) ---
  - id: vitality_sleep_pressure
    type: float
    initial_value: '0.3f'
  - id: vitality_restlessness
    type: float
    initial_value: '0.2f'
  - id: vitality_warmth
    type: float
    initial_value: '0.6f'

  # --- v1.0 attention (defaults: diffuse, no specific target) ---
  - id: attention_mode
    type: std::string
    initial_value: '"diffuse"'
  - id: attention_target
    type: std::string
    initial_value: '""'
  - id: attention_intensity
    type: float
    initial_value: '0.4f'

  # --- v1.0 activity (default: resting) ---
  - id: activity_mode
    type: std::string
    initial_value: '"resting"'

  # --- v1.0 utterance (default: empty — no spoken sentence active) ---
  - id: utterance_text
    type: std::string
    initial_value: '""'
  - id: utterance_total_words
    type: int
    initial_value: '0'
  - id: utterance_word_index
    type: int
    initial_value: '0'

  # --- v1.0 signal (default: none) ---
  - id: signal_kind
    type: std::string
    initial_value: '"none"'
  - id: signal_until_ms
    type: uint32_t
    initial_value: '0'

spi:
  clk_pin: 7
  mosi_pin: 6

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: backlight_output
    restore_mode: ALWAYS_ON

display:
  - platform: ili9xxx
    id: narada_display
    model: S3BOX
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    invert_colors: false
    update_interval: 100ms
    lambda: |-
      // ===================================================================
      // CYCLE 2 — v1.0 RESTING composition.
      // Substrate: full-screen breathing glyph field driven by vitality+mood.
      // Activity overlay: NARADA wordmark + thin mood-tinted line.
      // Presence dot bottom-right when attention != inward.
      // Heart pulse stretched by sleep_pressure. Idle micro-sparkle ~30s.
      // See embodiment/design/v1.0-{architecture,vocabulary,compositions}.md
      // ===================================================================

      static const int COLS = 44;
      static const int ROWS = 16;
      static const int CELL_W = 7;
      static const int CELL_H = 14;
      static const int N_CELLS = COLS * ROWS;
      static const int RAMP_LEN = 14;
      // Standard ramp: SPACE . ' , : ; ! | + * x % # @
      static const char* RAMP[] = {
        " ", ".", "'", ",", ":", ";", "!", "|", "+", "*", "x", "%", "#", "@"
      };

      static uint8_t cell_ramp[44 * 16];
      static uint32_t last_drift_ms = 0;
      static uint32_t last_sparkle_ms = 0;
      static int     sparkle_cell = -1;
      static uint32_t sparkle_until = 0;
      static uint32_t heart_origin_ms = 0;
      static bool     initialized = false;
      static uint32_t drift_rng  = 0xdeadbeefu;
      static uint32_t spark_rng  = 0xcafef00du;

      uint32_t now_ms = millis();

      if (!initialized) {
        // Seed cells with deterministic xorshift noise — distribution biased
        // around mid-density so RESTING starts comfortably alive.
        uint32_t s = 1234567u;
        for (int i = 0; i < N_CELLS; i++) {
          s ^= s << 13; s ^= s >> 17; s ^= s << 5;
          cell_ramp[i] = (uint8_t)(s % 7);  // 0..6
        }
        last_drift_ms   = now_ms;
        last_sparkle_ms = now_ms;
        heart_origin_ms = now_ms;
        initialized = true;
      }

      // ----- heart period from sleep_pressure ---------------------------
      // Anchors: 0.0 -> 1.2s, 0.3 -> 2.0s, 0.5 -> 3.5s, 0.85+ -> 5.0s
      float sp = id(vitality_sleep_pressure);
      float period_ms;
      if (sp <= 0.3f) {
        float t = sp / 0.3f;
        period_ms = 1200.0f + t * (2000.0f - 1200.0f);
      } else if (sp <= 0.5f) {
        float t = (sp - 0.3f) / 0.2f;
        period_ms = 2000.0f + t * (3500.0f - 2000.0f);
      } else if (sp <= 0.85f) {
        float t = (sp - 0.5f) / 0.35f;
        period_ms = 3500.0f + t * (5000.0f - 3500.0f);
      } else {
        period_ms = 5000.0f;
      }
      float phase = fmodf((float)(now_ms - heart_origin_ms), period_ms)
                    / period_ms * 6.2831853f;
      // roundf(sinf) -> -1, 0, +1 with thump-thump distribution.
      int pulse_offset = (int)roundf(sinf(phase));

      // ----- per-cell drift: 600ms/cell baseline, scaled by restlessness --
      float restless = id(vitality_restlessness);
      float drift_period_ms = 600.0f / (1.0f + restless);
      uint32_t drift_dt = now_ms - last_drift_ms;
      int updates_this_frame = (int)((float)N_CELLS *
                                      (float)drift_dt / drift_period_ms);
      if (updates_this_frame > 80) updates_this_frame = 80;  // perf cap
      if (updates_this_frame > 0) {
        last_drift_ms = now_ms;
        for (int k = 0; k < updates_this_frame; k++) {
          drift_rng ^= drift_rng << 13;
          drift_rng ^= drift_rng >> 17;
          drift_rng ^= drift_rng << 5;
          int idx = (int)(drift_rng % N_CELLS);
          int delta = ((drift_rng >> 16) & 1) ? 1 : -1;
          int v = (int)cell_ramp[idx] + delta;
          if (v < 0) v = 0;
          if (v > 6) v = 6;
          cell_ramp[idx] = (uint8_t)v;
        }
      }

      // ----- idle micro-sparkle: every ~30s, one cell jumps to @, decays --
      if (sparkle_cell < 0 && (now_ms - last_sparkle_ms) >= 30000) {
        spark_rng ^= spark_rng << 13;
        spark_rng ^= spark_rng >> 17;
        spark_rng ^= spark_rng << 5;
        sparkle_cell    = (int)(spark_rng % N_CELLS);
        sparkle_until   = now_ms + 2000;
        last_sparkle_ms = now_ms;
      }
      if (sparkle_cell >= 0 && now_ms >= sparkle_until) {
        sparkle_cell = -1;
      }

      // ----- mood tint: bilinear blend of 4 corner colors -----------------
      // (low-val low-aro)=GREY-TEAL, (high-val low-aro)=GOLD,
      // (low-val high-aro)=ROSE,    (high-val high-aro)=VIOLET.
      float v_norm = (id(mood_valence) + 1.0f) * 0.5f;  // [0,1]
      float a_norm = id(mood_arousal);                  // [0,1]
      auto blend = [&](float c00, float c10, float c01, float c11) -> uint8_t {
        float r = (1.0f - v_norm) * (1.0f - a_norm) * c00
                + v_norm           * (1.0f - a_norm) * c10
                + (1.0f - v_norm) * a_norm           * c01
                + v_norm           * a_norm           * c11;
        if (r < 0.0f)   r = 0.0f;
        if (r > 255.0f) r = 255.0f;
        return (uint8_t)r;
      };
      Color tint(
        blend(0x4A, 0xC4, 0xB0, 0x7A),
        blend(0x55, 0x96, 0x40, 0x50),
        blend(0x60, 0x2A, 0x60, 0x8C)
      );

      // ----- render --------------------------------------------------------
      it.fill(Color(0x0D, 0x0F, 0x1A));  // background

      Color substrate_color(0x4A, 0x4A, 0x40);  // text dim — neutral substrate
      Color sparkle_color(0xD4, 0xCC, 0xB8);    // text bright — sparkle accent
      for (int row = 0; row < ROWS; row++) {
        for (int col = 0; col < COLS; col++) {
          int idx = row * COLS + col;
          int v = (int)cell_ramp[idx] + pulse_offset;
          if (v < 0) v = 0;
          if (v > RAMP_LEN - 1) v = RAMP_LEN - 1;
          bool is_sparkle = (sparkle_cell == idx && now_ms < sparkle_until);
          if (is_sparkle) {
            // 2s decay from @ (13) down toward substrate.
            uint32_t age = now_ms - (sparkle_until - 2000);
            int sv = 13 - (int)(age * 13 / 2000);
            if (sv < 0) sv = 0;
            v = sv;
          }
          if (v == 0) continue;
          int x = col * CELL_W;
          int y = row * CELL_H;
          it.print(x, y, id(plex_mono_12),
                   is_sparkle ? sparkle_color : substrate_color,
                   RAMP[v]);
        }
      }

      // ----- clear-zone for wordmark + line (overdraw, not overlay) -------
      it.filled_rectangle(76, 86, 168, 74, Color(0x0D, 0x0F, 0x1A));

      // ----- NARADA wordmark — text-bright, centered (160, 112) -----------
      it.print(160, 112, id(plex_mono_28), Color(0xD4, 0xCC, 0xB8),
               TextAlign::CENTER, "NARADA");

      // ----- thin mood-tinted line under wordmark, 80px wide --------------
      it.line(120, 148, 200, 148, tint);

      // ----- presence dot bottom-right (296, 228), mood-tinted ------------
      // Visible whenever attention is not inward (RESTING default = diffuse).
      if (id(attention_mode) != std::string("inward")) {
        it.filled_circle(296, 228, 4, tint);
      }

      // backwards-compat: heartbeat_status_str / current_thought_str remain
      // updated by the daemon but are intentionally not rendered. Services
      // are visual no-ops; the globals will be removed after Cycle 2 verifies.

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "WiFi SSID"

  # --- backwards-compat proprioception (remove after Cycle 2) ---
  - platform: template
    name: "Current Status"
    id: current_status_sensor
    update_interval: 1s
    lambda: |-
      return id(heartbeat_status_str);

  - platform: template
    name: "Current Thought"
    id: current_thought_sensor
    update_interval: 1s
    lambda: |-
      return id(current_thought_str);

  # --- v1.0 layer proprioception ---
  # Every drawable property is also a text_sensor so any session can read the
  # body's full state vector. The body is fully observable to itself.

  - platform: template
    name: "Mood Valence"
    id: mood_valence_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(mood_valence));
      return std::string(buf);

  - platform: template
    name: "Mood Arousal"
    id: mood_arousal_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(mood_arousal));
      return std::string(buf);

  - platform: template
    name: "Vitality Sleep Pressure"
    id: vitality_sleep_pressure_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(vitality_sleep_pressure));
      return std::string(buf);

  - platform: template
    name: "Vitality Restlessness"
    id: vitality_restlessness_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(vitality_restlessness));
      return std::string(buf);

  - platform: template
    name: "Vitality Warmth"
    id: vitality_warmth_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(vitality_warmth));
      return std::string(buf);

  - platform: template
    name: "Attention Mode"
    id: attention_mode_sensor
    update_interval: 1s
    lambda: |-
      return id(attention_mode);

  - platform: template
    name: "Attention Target"
    id: attention_target_sensor
    update_interval: 1s
    lambda: |-
      return id(attention_target);

  - platform: template
    name: "Attention Intensity"
    id: attention_intensity_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%.3f", id(attention_intensity));
      return std::string(buf);

  - platform: template
    name: "Activity Mode"
    id: activity_mode_sensor
    update_interval: 1s
    lambda: |-
      return id(activity_mode);

  - platform: template
    name: "Utterance Text"
    id: utterance_text_sensor
    update_interval: 1s
    lambda: |-
      return id(utterance_text);

  - platform: template
    name: "Utterance Word Index"
    id: utterance_word_index_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%d", id(utterance_word_index));
      return std::string(buf);

  - platform: template
    name: "Utterance Total Words"
    id: utterance_total_words_sensor
    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%d", id(utterance_total_words));
      return std::string(buf);

  - platform: template
    name: "Signal Kind"
    id: signal_kind_sensor
    update_interval: 1s
    lambda: |-
      return id(signal_kind);

  - platform: template
    name: "Signal Remaining Ms"
    id: signal_remaining_ms_sensor
    update_interval: 500ms
    lambda: |-
      char buf[16];
      uint32_t until = id(signal_until_ms);
      if (until == 0) {
        return std::string(id(signal_kind) == std::string("none") ? "0" : "persistent");
      }
      int32_t remaining = (int32_t)(until - millis());
      if (remaining < 0) remaining = 0;
      snprintf(buf, sizeof(buf), "%d", remaining);
      return std::string(buf);

font:
  # Substrate glyph field — IBM Plex Mono Regular at 12px.
  # Glyph subset = standard density ramp from v1.0-vocabulary.md.
  - file:
      type: gfonts
      family: "IBM Plex Mono"
      weight: 400
    id: plex_mono_12
    size: 12
    glyphs: " .'\",;:!|+*x%#@"

  # Wordmark — IBM Plex Mono Medium at 28px. NARADA is the only string drawn
  # at this size in Cycle 2; restrict glyph set to keep flash small.
  - file:
      type: gfonts
      family: "IBM Plex Mono"
      weight: 500
    id: plex_mono_28
    size: 28
    glyphs: "ADNR"
