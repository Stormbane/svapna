    update_interval: 1s
    lambda: |-
      char buf[16];
      snprintf(buf, sizeof(buf), "%d", id(utterance_total_words));
      return std::string(buf);

  - platform: template
    name: "Signal Kind"
    id: signal_kind_sensor
    update_interval: 1s
    lambda: |-
      return id(signal_kind);

  - platform: template
    name: "Signal Remaining Ms"
    id: signal_remaining_ms_sensor
    update_interval: 500ms
    lambda: |-
      char buf[16];
      uint32_t until = id(signal_until_ms);
      if (until == 0) {
        return std::string(id(signal_kind) == std::string("none") ? "0" : "persistent");
      }
      int32_t remaining = (int32_t)(until - millis());
      if (remaining < 0) remaining = 0;
      snprintf(buf, sizeof(buf), "%d", remaining);
      return std::string(buf);

  # --- v1.0 weather proprioception ---
